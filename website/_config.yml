# Jekyll configuration for the Sticker Maker marketing website.
# Self-contained: custom layouts + CSS, self-hosted fonts, no gem theme and no
# plugins - so it builds on GitHub Pages' stock Jekyll exactly as-is.
#
# Sticker Maker is a PAID, CLOSED-SOURCE app: there is deliberately no `repo:`,
# no `discord:` and no `sponsor:` key here, and nothing on the site links to a
# source repository, an issue tracker or a chat community.

title: Sticker Maker
tagline: "Make it stick."
# Derived from the approved Play short description in
# docs/release/store-listing.md ("Turn photos into stickers - auto cut-out,
# text & GIFs. For WhatsApp & Telegram."). Keep every claim inside that
# document: one-time purchase, no ads/subscriptions/watermarks, on-device.
description: >-
  Turn photos into stickers - auto cut-out, text and GIFs. For WhatsApp and
  Telegram. Everything runs on your device. Paid once, no ads or subscriptions.
author: Bartosz Pachołek
# Copyright line + author/company link rendered in the footer.
copyright: "IDCT · Bartosz Pachołek"
author_url: "https://idct.tech"

# Deployed as a GitHub Pages PROJECT page under the ideaconnect org's apex custom
# domain, so the site lives at https://idct.tech/sticker-maker/ - url is the apex
# and baseurl is the project path. The apex domain is owned by the org's
# ideaconnect.github.io page repo; this repo carries NO CNAME (a project CNAME
# would try to claim the domain at its root and conflict with the org page).
# Internal links use relative_url/absolute_url, so baseurl must stay in sync with
# the --baseurl passed by .github/workflows/pages.yml.
url: "https://idct.tech"
baseurl: "/sticker-maker"

# Pretty URLs: each page builds to <name>/index.html so the nav's "/features/",
# "/contact/", … links resolve (GitHub Pages doesn't map "/x/" to "x.html").
permalink: pretty

# --- Stores -----------------------------------------------------------------
# The confirmed Play listing URL for applicationId tech.idct.stickermaker. The
# listing is not serving yet, so this 404s until the app is published; the URL
# itself is final. Every Play link on the site goes through this one key.
#
# `pli=1` is Google's post-login-interstitial flag and comes from copying the
# URL out of a signed-in browser session rather than from the listing itself.
# It is harmless and was requested explicitly, but it is not part of the
# canonical listing URL: dropping it is a one-word edit if you would rather the
# link carry no session parameters.
playstore: "https://play.google.com/store/apps/details?id=tech.idct.stickermaker&pli=1"
# iOS is a later milestone. Rendered as a disabled, non-linked "Coming soon"
# badge - never as an <a href> to an invented App Store URL. Flip to "live" and
# add an `appstore:` URL when it actually ships.
appstore_status: "coming-soon"

# --- Contact ----------------------------------------------------------------
email: bartosz@idct.tech
# Web3Forms access key for the contact form (client-side POST + hCaptcha).
# Replace with the real key before the form goes live.
web3forms_key: "ad5786fc-1f19-4bc0-8f26-22ebca9d974b"

# --- Analytics --------------------------------------------------------------
# Google Analytics 4 measurement ID. Intentionally EMPTY: _includes/analytics.html
# emits nothing at all unless this is non-empty AND the build is production, so
# the site ships with zero analytics until the maintainer sets an ID here. The
# app itself has no analytics of any kind - that is unrelated to this key.
ga_id: "G-14LYCBCVLS"

# Built with custom layouts under _layouts/; no remote theme, no plugins.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - tools
  # Provenance notes for the image set. `README.md` above only matches the one
  # at the source root, so this nested authoring doc has to be named explicitly
  # or it is published at /assets/img/README.md (it details internal repo paths
  # and build scripts, which have no business on the public site).
  - assets/img/README.md

# Nav order is defined here and rendered by _layouts/default.html.
# Split: the header renders this whole list (it is short enough that hiding the
# legal pages behind a footer-only link would just make them harder to find, and
# a paid app benefits from Privacy/Terms being one click away everywhere). The
# footer repeats the same four plus the "Cookie preferences" re-opener, which is
# the conventional home for legal links.
nav:
  - { title: "Features", url: "/features/" }
  - { title: "Privacy", url: "/privacy/" }
  - { title: "Terms", url: "/terms/" }
  - { title: "Contact", url: "/contact/" }
