{%- comment -%}
  Google Play's triangle mark, used to label the Google Play link.
  Verbatim glyph from Font Awesome Free 6.7.2 (brands/google-play.svg), fetched from
  the upstream repo rather than redrawn, so it matches the sibling sites, which
  inline Font Awesome brand paths the same way. The attribution comment below is
  rendered on purpose: Font Awesome Free's icons are CC BY 4.0 and that licence
  requires attribution, so it must survive into the built HTML.
  This is the plain brand glyph, NOT the official "Get it on Google Play" /
  "Download on the App Store" badge lockup, which have their own artwork rules.
{%- endcomment -%}
