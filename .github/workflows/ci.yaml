name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Keep this in sync with docs/DEVELOPMENT.md
env:
  FLUTTER_VERSION: "3.44.6"
  JAVA_VERSION: "17"

jobs:
  analyze-test-build:
    name: Analyze, test & build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        # Golden tests are excluded: Skia/font rendering differs across hosts,
        # and baselines are generated on the maintainer's machine.
        run: flutter test --exclude-tags golden

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
